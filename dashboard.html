<html>

<head>
    <title>Student Voice - Dashboard</title>
    <link rel="stylesheet" href="css/style.css" />
</head>

<body>

    <!-- NAVBAR -->
    <header class="navbar">
        <div class="navbar-left">

            <div class="menu" onclick="toggleMenu()">&#9776;</div>

            <!-- Dropdown Menu -->
            <div class="dropdown-menu" id="dropdownMenu">
                <a href="index.html">🏠 Home</a>
                <a href="report.html">📝 Report an Issue</a>
                <a href="dashboard.html">📊 Dashboard</a>
                <a href="admin.html">⚙️ Admin Panel</a>
            </div>

            <h1>Student Voice</h1>
        </div>
        <div class="navbar-right">
            <span class="page-title">Dashboard</span>
        </div>
    </header>

    <!-- STATS CARDS -->
    <div class="stats-container">
        <div class="stat-card">
            <div class="stat-label">Total Issue</div>
            <div class="stat-value" id="totalCount">0</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Resolved</div>
            <div class="stat-value" id="resolvedCount">0</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Pending</div>
            <div class="stat-value" id="pendingCount">0</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Processing</div>
            <div class="stat-value" id="processingCount">0</div>
        </div>
    </div>

    <!-- FILTER SECTION -->
    <section class="filter-section">
        <div class="filter-group">
            <label for="filterCategory">Filter by Category</label>
            <select id="filterCategory">
                <option value="All">All</option>
                <option value="Wifi">Wifi</option>
                <option value="Classroom">Classroom</option>
                <option value="Library">Library</option>
                <option value="Lab">Lab</option>
                <option value="Room">Room</option>
            </select>
        </div>
        <div class="filter-group">
            <label for="filterStatus">Filter by Status</label>
            <select id="filterStatus">
                <option value="All">All</option>
                <option value="Not Open">Not Open</option>
                <option value="Processing">Processing</option>
                <option value="Resolved">Resolved</option>
            </select>
        </div>

        <div class="filter-btn-group">
            <button class="apply-btn" onclick="applyFilters()">Apply Filters</button>
        </div>

    </section>

    <!-- ISSUE TABLE -->
    <div class="table-wrapper">
        <table class="issue-table">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Category</th>
                    <th>Description</th>
                    <th>Priority</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody id="issueTableBody">
                <!-- Rows injected by JavaScript -->
            </tbody>
        </table>

        <!-- PAGINATION -->
        <div class="pagination">
            <button class="page-btn" id="prevBtn" onclick="changePage(-1)">&#60;</button>
            <span class="page-num" id="pageNum">01</span>
            <button class="page-btn" id="nextBtn" onclick="changePage(1)">&#62;</button>
        </div>
    </div>

    <!-- FOOTER -->
    <footer class="footer">
        <a href="#">Help</a>
        <span class="dot">•</span>
        <a href="#">Privacy Policy</a>
        <span class="dot">•</span>
        <a href="#">Terms of Service</a>
    </footer>

    <script src="jss/script.js"></script>
</body>

</html>
