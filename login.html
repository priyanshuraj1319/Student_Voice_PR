<html>

<head>
    <title>Student Voice - Login</title>
    <link rel="stylesheet" href="css/style.css" />
</head>

<body>

    <div class="screen" id="roleScreen">
        <div class="login-card">
            <h1 class="brand">STUDENT VOICE</h1>

            <video class="login-video" autoplay loop muted playsinline>
                <source src="IMG/banner.mp4" type="video/mp4" />
            </video>

            <div class="role-buttons">
                <button class="role-btn" onclick="selectRole('student')">STUDENT</button>
                <button class="role-btn" onclick="selectRole('admin')">ADMIN</button>
            </div>

            <p class="role-hint">
                Do select a button,<br>
                if u are a student and want to report an issue, go to "Student Portal".<br>
                if you are an admin, go to "Admin Portal".
            </p>
        </div>
    </div>

    <div class="screen hidden" id="otpScreen">
        <div class="login-card otp-card">
            <h1 class="brand">STUDENT VOICE</h1>
            <h2 class="portal-title" id="portalTitle">STUDENT PORTAL</h2>
            <p class="go_bk_bt" onclick="goBack()">← Go Back</p>

            <div id="adminLoginForm" class="hidden">
                <input type="text" id="adminId" class="phone-input" placeholder="Enter Admin ID" />
                <input type="password" id="adminPass" class="phone-input" placeholder="Enter Password"
                    style="margin-top:10px;" />
                <button class="verify-btn" style="margin-top:14px;" onclick="verifyAdmin()">LOGIN</button>
            </div>

            <div id="otpSection">


                <input type="number" id="phoneInput" class="phone-input" placeholder="Enter your number"
                    maxlength="10" />

                <div class="otp-row">
                    <div class="otp-section">
                        <div class="otp-boxes">
                            <input class="otp-box" id="otp1" maxlength="1" type="text"
                                oninput="otpMove(this, 'otp2')" />
                            <input class="otp-box" id="otp2" maxlength="1" type="text"
                                oninput="otpMove(this, 'otp3')" />
                            <input class="otp-box" id="otp3" maxlength="1" type="text"
                                oninput="otpMove(this, 'otp4')" />
                            <input class="otp-box" id="otp4" maxlength="1" type="text" />
                        </div>
                        <span class="gen-otp-text" onclick="generateOTP()">Generate OTP</span>
                    </div>
                    <button class="verify-btn" onclick="verifyOTP()">VERIFY</button>
                </div>
            </div>

        </div>

        <div class="otp-popup hidden" id="otpPopup">
            OTP : <span id="otpDisplay"></span>
        </div>
    </div>

    <footer class="footer">
        <span>Help</span>
        <span class="dot">&#8226;</span>
        <span>Privacy Policy</span>
        <span class="dot">&#8226;</span>
        <span>Terms of Service</span>
    </footer>

    <script>
        function checkAuth() {
            if (sessionStorage.getItem('loggedIn')) {
                const role = sessionStorage.getItem('role');
                window.location.replace(role === 'admin' ? 'admin.html' : 'index.html');
            }
        }

        checkAuth();

        window.addEventListener('pageshow', function (event) {
            if (event.persisted) {
                checkAuth();
            }
        });
    </script>

    <script src="js/script.js"></script>
</body>

</html>
