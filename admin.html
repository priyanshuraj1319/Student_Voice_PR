<html>

<head>
  <title>Student Voice - Admin Panel</title>
  <link rel="stylesheet" href="css/style.css" />
</head>

<body>

  <header class="navbar">
    <div class="navbar-left">

      <div class="menu" onclick="toggleMenu()">&#9776;</div>

      <div class="dropdown-menu" id="dropdownMenu">
        <a href="admin.html">⚙️ Admin Panel</a>
        <a href="about.html">ℹ️ About</a>
        <a href="#" onclick="logout()">🚪 Log Out</a>
      </div>

      <h1>Student Voice</h1>
    </div>
    <div class="navbar-right">
      <span class="page-title">Admin Panel</span>
    </div>
  </header>

  <section class="stats-section">
    <div class="stat-card">
      <div class="stat-label">Total Issue</div>
      <div class="stat-value" id="totalCount">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Resolve</div>
      <div class="stat-value" id="resolvedCount">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Pending</div>
      <div class="stat-value" id="pendingCount">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Processing</div>
      <div class="stat-value" id="processingCount">0</div>
    </div>
  </section>

  <section class="filter-section">
    <div class="filter-group">
      <label for="filterCategory">Filter by Category</label>
      <select id="filterCategory">
        <option value="All">All</option>
        <option value="Hostel Issue">Hostel Issue</option>
        <option value="Mess Issue">Mess Issue</option>
        <option value="Electricity">Electricity</option>
        <option value="Water Problem">Water Problem</option>
        <option value="Cleaning">Cleaning</option>
        <option value="Wifi">Wifi</option>
        <option value="Class Room">Class Room</option>
        <option value="Library">Library</option>
      </select>
    </div>
    <div class="filter-group">
      <label for="filterStatus">Filter by Status</label>
      <select id="filterStatus">
        <option value="All">All</option>
        <option value="Not Open">Not Open</option>
        <option value="Processing">Processing</option>
        <option value="Resolved">Resolved</option>
      </select>
    </div>

    <div class="filter-btn-group">
      <button class="apply-btn" onclick="applyFilters()">Apply Filters</button>
    </div>

  </section>

  <section class="table-section">
    <table class="issue-table">
      <thead>
        <tr>
          <th>ID</th>
          <th>Category</th>
          <th>Description</th>
          <th>Date</th>
          <th>Priority</th>
          <th>Status</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="issueTableBody">
        <!-- Rows injected by JS -->
      </tbody>
    </table>

    <div class="pagination">
      <button class="page-btn" id="prevBtn" onclick="changePage(-1)">&#60;</button>
      <span class="page-num" id="pageDisplay">01</span>
      <button class="page-btn" id="nextBtn" onclick="changePage(1)">&#62;</button>
    </div>
  </section>

  <footer class="footer">
    <span>Help</span>
    <span class="dot">&#8226;</span>
    <span>Privacy Policy</span>
    <span class="dot">&#8226;</span>
    <span>Terms of Service</span>
  </footer>
<script src="js/script.js"></script>
</body>

</html>
