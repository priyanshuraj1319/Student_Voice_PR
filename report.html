<html>

<head>
    <title>Student Voice - Report an Issue</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <div class="RIPnavbar">
        <div class="menu" onclick="toggleMenu()">&#9776;</div>

        <!-- Dropdown Menu -->
        <div class="dropdown-menu" id="dropdownMenu">
            <a href="index.html">🏠 Home</a>
            <a href="report.html">📝 Report an Issue</a>
            <a href="dashboard.html">📊 Dashboard</a>
            <a href="admin.html">⚙️ Admin Panel</a>
            <a href="about.html">ℹ️ About</a>
            <a href="#" onclick="logout()">🚪 Log Out</a>  

        </div>
        <h1>Student Voice</h1>
    </div>


    <div class="heading">
        <span class="icon">⚠</span>
        <h2>Report an Issue</h2>
    </div>

    <div class="form-container">

        <form id="issueForm">
            <input type="text" id="name" placeholder="Student name">
            <input type="text" id="roll" placeholder="Roll number">
            <input type="text" id="dept" placeholder="Department">
            <select id="category">
                <option value="">Select Category</option>
                <option>Hostel Issue</option>
                <option>Mess Issue</option>
                <option>Electricity</option>
                <option>Water Problem</option>
                <option>Cleaning</option>
                <option>Wifi</option>
                <option>Class Room</option>
                <option>Library</option>
            </select>
            <select id="priority">
                <option value="">Select Priority</option>
                <option value="High">High</option>
                <option value="Mid">Mid</option>
                <option value="Low">Low</option>
            </select>
            <textarea id="description" placeholder="Description"></textarea>
            <button type="submit">SUBMIT</button>
        </form>

    </div>

    <footer class="footer">
        <span>Help</span>
        <span class="dot">&#8226;</span>
        <span>Privacy Policy</span>
        <span class="dot">&#8226;</span>
        <span>Terms of Service</span>
    </footer>
    <script src="jss/script.js"></script>
</body>

</html>
